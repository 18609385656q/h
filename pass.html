<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未命名页面</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            background: #000;
            color: #aaaaaa;
            font-family: "SimSun", serif;
        }
        body{
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 2.5;
        }
        .text{
            font-size: 16px;
            margin-bottom: 40px;
            animation: flicker 4s infinite;
        }
        input{
            border: 1px solid #444;
            padding: 8px 15px;
            font-size: 15px;
            width: 220px;
            text-align: center;
            outline: none;
        }
        .tip{
            margin-top: 30px;
            font-size: 14px;
            color: #666;
        }
        .error{
            color: #8b2222;
            margin-top: 20px;
            display: none;
        }
        @keyframes flicker {
            0%,90%,100% {opacity: 1;}
            95% {opacity: 0.6;}
        }
    </style>
</head>
<body>
    <div class="text">
        权限验证<br>
        请输入访问密钥<br>
        密钥来自存档异常记录
    </div>

    <input type="text" id="pwd" placeholder="在此输入密钥">
    <div class="tip">按下回车提交</div>
    <div class="error" id="err">我看见你了...</div>

    <script>
        const pwdInput = document.getElementById('pwd');
        const errTip = document.getElementById('err');
        const rightPwd = "VOID668";

        pwdInput.addEventListener('keydown',function(e){
            if(e.key === 'Enter'){
                let val = this.value.trim();
                if(val === rightPwd){
                    window.location.href = "deep.html";
                }else{
                    errTip.style.display = "block";
                }
            }
        })
    </script>
</body>
</html>
